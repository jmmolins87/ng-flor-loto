



<div class="wrap-modal-messages">
    <p-dialog 
        [header]="'OTHERS.ORDER_MESSAGES' | translate" 
        [modal]="true" 
        [(visible)]="visible" 
        [breakpoints]="{ '1199px': '50vw', '992px': '75vw', '575px': '90vw' }" 
        [style]="{ width: '50vw' }" 
        [draggable]="false" >
            <p-tabView>
                <p-tabPanel header="Whatsapp">
                    <app-whatsapp />
                </p-tabPanel>
                <p-tabPanel header="SMS">
                    <app-sms />
                </p-tabPanel>
            </p-tabView>
    </p-dialog>
</div>
