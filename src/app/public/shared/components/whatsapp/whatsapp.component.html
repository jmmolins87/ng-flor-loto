

<div class="wrap-whatsapp">    
    <p-dialog 
        [draggable]="false" 
        [modal]="true" 
        [breakpoints]="{ '1199px': '75vw', '575px': '90vw' }" 
        [(visible)]="visible" 
        [style]="{width: '50vw'}">
        <h3 class="whatsapp-modal__title mt-0">¡¡Haz tu pedido aquí!!</h3>
        <form [formGroup]="whatsappForm" (ngSubmit)="onSubmit()" class="whatsapp-modal__form">
            <div class="p-field">
                <label for="name" class="whatsapp-modal__form--label">Nombre</label>
                <input 
                    id="name" 
                    type="text" 
                    pInputText 
                    formControlName="name" 
                    class="whatsapp-modal__form--input" />
                <p *ngIf="whatsappForm.get('name')?.invalid && whatsappForm.get('name')?.touched">
                    <small class="p-error">El nombre es requerido.</small>
                </p>
            </div>
            <div class="p-field">
                <label for="message" class="whatsapp-modal__form--label">Mensaje</label>
                <textarea 
                    id="message" 
                    pInputTextarea 
                    formControlName="message" 
                    class="whatsapp-modal__form--textarea">
                </textarea>
                <p *ngIf="whatsappForm.get('message')?.invalid && whatsappForm.get('message')?.touched">
                    <small class="p-error">El mensaje es requerido.</small>
                </p>
            </div>
            <button 
                type="submit" 
                pButton 
                label="Enviar" 
                [disabled]="whatsappForm.invalid">
            </button>
        </form>
    </p-dialog>
</div>
<div id="whatsapp-chat-widget"></div>
