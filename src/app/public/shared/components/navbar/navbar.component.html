<nav [ngClass]="scrolled ? 'scroll' : ''" class="navbar navbar-expand-xl">
    <div class="container-fluid wrap-navbar">
        <a 
            [routerLink]="['/']" 
            [attr.data-bs-toggle]="isTablet ? '' : 'collapse'"
            [attr.data-bs-target]="isTablet ? '' : '#navbarFsnArg'"
            [attr.aria-controls]="isTablet ? '' : 'navbarFsnArg'"
            [attr.aria-expanded]="isTablet ? '' : 'false'"  
            class="navbar-brand">
            <img 
                src="/assets/img/logo-loto.png" 
                alt="Logo Flor de loto Segovia"
                title="Logo Flor de loto Segovia">
        </a>
        <button type="button" data-bs-toggle="collapse" data-bs-target="#navbarFsnArg" aria-controls="navbarFsnArg"
            aria-expanded="false" aria-label="Toggle navigation" class="navbar-toggler collapsed">
            <span></span>
            <span></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarFsnArg">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li *ngFor="let item of menuItems" [routerLinkActive]="['active']" class="nav-item">
                    <a 
                        [routerLink]="item.link" [title]="item.label"
                        [attr.data-bs-toggle]="isTablet ? '' : 'collapse'"
                        [attr.data-bs-target]="isTablet ? '' : '#navbarFsnArg'"
                        [attr.aria-controls]="isTablet ? '' : 'navbarFsnArg'"
                        [attr.aria-expanded]="isTablet ? '' : 'false'" 
                        class="nav-link" aria-current="page">
                        {{ item.label }}
                        <span [class]="item.icon"></span>
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>
