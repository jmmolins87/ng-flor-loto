<footer class="wrap-footer">
    <div class="container">
        <div class="wrapper-footer">
            <ul class="wrap-polities">
                <li *ngFor="let policie of footerPolicies">
                    <a [routerLink]="policie.link">
                        {{ policie.label | translate }}
                    </a>
                </li>
            </ul>
            <div [routerLink]="['/']" class="wrap-logo">
                <img 
                    src="/assets/img/logo-loto.png" 
                    alt="Logo flor de loto" 
                    title="Logo flor de loto">
            </div>
            <ul class="wrap-location">
                <li *ngFor="let contact of footerContact">
                    <a 
                        target="_blank" 
                        [href]="contact.link">
                        <i class="pi {{ contact.icon }}"></i> 
                        {{ contact.label | translate }}
                    </a>
                </li>
            </ul>
        </div>
    </div>
    <div class="wrap-info">
        <div class="wrap-info">
            <p>&copy; {{ "FOOTER.RIGHTS" | translate }} <span>{{ currentYear }}</span></p>
            <p>{{ "FOOTER.MY_SITE" | translate }} <i class="pi pi-heart-fill"></i></p>
        </div>
    </div>
</footer>
