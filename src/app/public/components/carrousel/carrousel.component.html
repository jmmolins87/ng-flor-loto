<div class="card">
    <p-carousel 
        [value]="itemsCarrousel" 
        [numVisible]="3" 
        [numScroll]="3" 
        [circular]="true"
        [responsiveOptions]="responsiveOptions" 
        autoplayInterval="10000">
        <ng-template let-product pTemplate="item" >
            <div class="border-1 m-2 p-3 wrap-rating">
                <div class="wrap-header">
                    <h3 class="mb-3 font-medium opinator-name">
                        {{ product.name }}
                    </h3>
                    <p-rating
                        *ngIf="product.rating"
                        [(ngModel)]="product.rating" 
                        [readonly]="true" 
                        [cancel]="false" />
                </div>
                <div class="flex justify-content-between align-items-center">
                    <p [innerHtml]="product.description" class="mt-0 opinator-description"></p>
                    <p-button 
                        [outlined]="true"
                        pButton 
                        type="button" 
                        severity="success"
                        icon="pi pi-book"
                        iconPos="right"
                        label="Leer más" 
                        (click)="openModal(product)" />
                </div>
            </div>
        </ng-template>
    </p-carousel>
</div>

<p-dialog 
    [(visible)]="displayModal" 
    [modal]="true"
    [draggable]="false"
    [baseZIndex]="10000"
    [maximizable]="true"
    [style]="{width: '50vw'}">
    <div *ngIf="selectedProduct" class="wrap-modal-rating">
        <h3 class="mb-3 mt-2">{{ selectedProduct.name }}</h3>
        <p-rating 
            *ngIf="selectedProduct.rating" 
            [(ngModel)]="selectedProduct.rating" 
            [readonly]="true" 
            [cancel]="false" class="mt-1 mb-2" />
        <p [innerHtml]="selectedProduct.description" class="mt-1"></p>
        <div *ngIf="selectedProduct.image" class="wrap-imges mt-2">
            <img 
                *ngFor="let image of selectedProduct.image; let i = index"
                [src]="image" 
                [alt]="selectedProduct.name" 
                class="img" />
        </div>
    </div>
</p-dialog>
