

<div class="wrap-card">
    <div class="wrap-image">
        <app-gallery-image
          [images]="srcImg"
          [altImg]="titleCard"
          *ngIf="!showSkeleton" />
        <p-skeleton *ngIf="showSkeleton" width="100%" height="20rem" />
    </div>
    <div *ngIf="titleCard" class="wrap-info">
      <h3 *ngIf="!showSkeleton" class="title-card-product">{{ titleCard | translate }}</h3>
      <p-skeleton *ngIf="showSkeleton" width="15rem" height="2rem" styleClass="mb-4" />
      <p *ngIf="!showSkeleton" [innerHTML]="descriptionCard | translate"></p>
      <p-skeleton *ngIf="showSkeleton" height="15px" width="100%" styleClass="mb-2" />
      <p-skeleton *ngIf="showSkeleton" height="15px" width="100%" styleClass="mb-2" />
      <p-skeleton *ngIf="showSkeleton" height="15px" width="100%" styleClass="mb-2" />
      <p-skeleton *ngIf="showSkeleton" height="15px" width="100%" styleClass="mb-2" />
      <p-skeleton *ngIf="showSkeleton" height="15px" width="100%" styleClass="mb-2" />
      <p-skeleton *ngIf="showSkeleton" height="15px" width="100%" styleClass="mb-2" />
      <p-skeleton *ngIf="showSkeleton" height="15px" width="100%" styleClass="mb-2" />
      <p-skeleton *ngIf="showSkeleton" height="15px" width="50%" styleClass="mb-2" />
    </div>
</div>
