



<div class="wrap-home">
    <div class="video-container">
        <app-flower-background />
    </div>
    <div class="container">
        <div class="wrap-title">
            <h1 class="title">{{ titlePage }}</h1>
            <h3 class="subtitle">{{ subtitlePage }}</h3>
        </div>
        <div class="wrap-presentation">
            <app-typewriter-animation 
                [text]="textPresentatiin" 
                [typingSpeed]="100"
                [height]="200" />
        </div>
        <div class="wrap-title mt-3">
            <h3 class="subtitle mb-0 ">{{ recommendationsTitleSection }}</h3>
        </div>
        <div class="wrap-recommends">
            <div *ngFor="let recomendation of recommendationsSection" class="wrap-presentation">
                <h3>{{ recomendation.title }}</h3>
                <div class="card flex justify-content-center">
                    <p-image 
                        src="https://primefaces.org/cdn/primeng/images/galleria/galleria11.jpg"
                        alt="Image" 
                        width="100%" />
                </div>
                <p class="mt-2">{{ recomendation.description }}</p>
            </div>
        </div>
        <div class="wrap-title mt-3">
            <h3 class="subtitle mb-0">{{ opinionsTitleSection }}</h3>
        </div>
        <div class="wrap-carrousel-opinions mb-3">
            <app-carrousel [itemsCarrousel]="opinionsSection" />
        </div>
    </div>
</div>
