







<div class="container m-container">
    <div class="wrap-product">
        <div class="wrap-title">
          <h1 *ngIf="!showSkeletonTitle" class="title">{{ "FLOORS_PAGE.SUBMENU.MORE_FLOORS_PAGE.TITLE_PAGE" | translate }}</h1>
          <p-skeleton *ngIf="showSkeletonTitle" width="40rem" height="5rem" styleClass="mb-2" />
        </div>
        <div class="product-wrap-cards">
            <div *ngFor="let moreFloors of moreFloorsContent" class="wrap-card">
                <app-card
                  [srcImg]="moreFloors.srcImg"
                  [altImg]="moreFloors.titleCard"
                  [title]="moreFloors.titleCard"
                  [titleCard]="moreFloors.titleCard"
                  [descriptionCard]="moreFloors.descriptionCard || ''" />
            </div>
        </div>
    </div>
</div>
