






<div class="container m-container">
    <div class="wrap-product">
        <div class="wrap-title">
          <h1 *ngIf="!showSkeletonTitle" class="title">{{ "BOUQETS_PAGE.TITLE" | translate }}</h1>
          <p-skeleton *ngIf="showSkeletonTitle" width="40rem" height="5rem" styleClass="mb-2" />
        </div>
        <div class="product-wrap-cards">
            <div *ngFor="let bouquet of bouquetsContent" class="wrap-card">
              <app-card
                [srcImg]="bouquet.srcImg"
                [gallery]="true"
                [altImg]="bouquet.titleCard"
                [title]="bouquet.titleCard"
                [titleCard]="bouquet.titleCard"
                [descriptionCard]="bouquet.descriptionCard || ''" />
            </div>
        </div>
    </div>
</div>
