<mat-card class="dashboard-card">
    <mat-card-header>
        <mat-card-title>Login</mat-card-title>
    </mat-card-header>
    <mat-card-content>
        <form (submit)="onLogin()">
            <mat-form-field>
                <input 
                    [(ngModel)]="username" 
                    matInput 
                    placeholder="Username" 
                    name="username" 
                    required />
            </mat-form-field>
            <mat-form-field>
                <input 
                    [(ngModel)]="password" 
                    matInput 
                    type="password" 
                    placeholder="Password" 
                    name="password"
                    required />
            </mat-form-field>
            <button 
                mat-raised-button 
                color="primary" 
                type="submit">
                Login
            </button>
        </form>
    </mat-card-content>
</mat-card>
