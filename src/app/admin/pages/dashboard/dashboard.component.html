

<mat-card class="dashboard-card">
    <mat-card-header>
        <mat-card-title>Dashboard - Gestión de Contenido</mat-card-title>
    </mat-card-header>
    <mat-card-content>
        <p>Bienvenido, <strong>{{ username }}</strong>. Aquí puedes gestionar las pantallas del sitio.</p>
        <div class="content-list">
            <mat-list>
                <mat-list-item *ngFor="let content of contentList">
                    <div class="content-item">
                        <h3>{{ content.title }}</h3>
                        <p>{{ content.description }}</p>
                        <button 
                            mat-raised-button 
                            color="primary" 
                            (click)="onEdit(content)">
                            Editar
                        </button>
                        <button 
                            mat-raised-button 
                            color="warn" 
                            (click)="onDelete(content)">
                            Eliminar
                        </button>
                    </div>
                </mat-list-item>
            </mat-list>
        </div>
        <button 
            mat-raised-button 
            color="accent" 
            (click)="onAddNew()">
            Agregar nuevo contenido
        </button>
    </mat-card-content>
</mat-card>

<button 
    mat-raised-button 
    (click)="logOut()" 
    color="primary" 
    type="submit">
    LogOut
</button>
